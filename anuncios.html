  <style>
    :root{

      --amarillo:#F5A623;--amarillo-dark:#E09000;
      --rojo:#E53935;--verde:#2E7D32;--verde-light:#E8F5E9;

    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:var(--negro)}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:var(--azul);height:60px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.2)}

    .nav-links{display:flex;gap:1.25rem;list-style:none;margin-left:auto}

    /* HERO BUSCADOR */
    .hero{background:var(--azul);padding:2rem 2rem 1.75rem;text-align:center}
    .hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:white;margin-bottom:.35rem}
    .hero p{color:rgba(255,255,255,.65);font-size:.9rem;margin-bottom:1.25rem}
    .hero-search{display:flex;background:white;border-radius:8px;overflow:hidden;max-width:680px;margin:0 auto;box-shadow:0 6px 24px rgba(0,0,0,.2)}
    .hero-search select{border:none;outline:none;background:var(--fondo);padding:0 1rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;border-right:2px solid var(--borde);min-width:155px;cursor:pointer;color:var(--negro)}
    .hero-search input{flex:1;border:none;outline:none;padding:.85rem 1rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--negro)}
    .hero-search button{background:var(--amarillo);border:none;padding:0 1.4rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;color:var(--negro);white-space:nowrap}

    /* PILLS MOBILE */
    .pills-mobile{display:none;gap:.5rem;overflow-x:auto;padding:.65rem 1rem;background:white;border-bottom:1px solid var(--borde);scrollbar-width:none}
    .pills-mobile::-webkit-scrollbar{display:none}
    .pill-m{padding:.38rem .85rem;border-radius:100px;border:1.5px solid var(--borde);font-size:.8rem;white-space:nowrap;cursor:pointer;flex-shrink:0;background:var(--fondo);transition:all .15s}
    .pill-m.ok{background:var(--azul);color:white;border-color:var(--azul)}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:220px 1fr;gap:1.5rem;max-width:1200px;margin:0 auto;padding:1.75rem 1.5rem}

    /* SIDEBAR */
    .sidebar{position:sticky;top:76px;height:fit-content;display:flex;flex-direction:column;gap:.75rem}

    .filtro-titulo{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--borde)}

    .card-precio{font-size:1rem;font-weight:700;color:var(--rojo);margin-bottom:.4rem}
    .card-footer{display:flex;justify-content:space-between;align-items:center}
    .card-loc{font-size:.73rem;color:var(--gris)}

    /* ESTADOS */
    .loading-msg{grid-column:1/-1;text-align:center;padding:4rem;color:var(--gris);font-size:.95rem}
    .empty-msg{grid-column:1/-1;text-align:center;padding:4rem 2rem}
    .empty-icon{font-size:3rem;margin-bottom:.75rem}
    .empty-title{font-weight:600;font-size:1rem;margin-bottom:.4rem}
    .empty-sub{font-size:.85rem;color:var(--gris)}
    .empty-sub a{color:var(--azul)}

    /* PAGINACIÓN */
    .paginacion{display:flex;gap:.4rem;justify-content:center;margin-top:1.75rem;flex-wrap:wrap}
    .pag-btn{padding:.45rem .85rem;border-radius:6px;border:1.5px solid var(--borde);background:white;font-size:.83rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
    .pag-btn:hover{border-color:var(--azul);color:var(--azul)}
    .pag-btn.activo{background:var(--azul);color:white;border-color:var(--azul);font-weight:600}

    /* TAGS FILTROS ACTIVOS */
    .filtros-activos{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
    .tag-filtro{display:inline-flex;align-items:center;gap:.3rem;background:var(--azul-light);color:var(--azul);font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:100px;cursor:pointer}
    .tag-filtro:hover{background:#c5d9f5}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr;padding:.75rem;gap:.75rem}
      .sidebar{display:none}
      .pills-mobile{display:flex}
      nav{padding:0 1rem;gap:.75rem}
      .nav-search,.nav-links{display:none}
      .hero{padding:1.25rem 1rem 1rem}
      .hero h1{font-size:1.25rem}
      .hero p{font-size:.82rem;margin-bottom:1rem}
      .hero-search{flex-wrap:wrap}
      .hero-search select{min-width:100%;border-right:none;border-bottom:2px solid var(--borde);border-radius:0}
      .hero-search button{width:100%;padding:.7rem;border-radius:0 0 8px 8px}
      .content-header{flex-direction:column;align-items:flex-start;gap:.5rem}
      .grid{grid-template-columns:repeat(2,1fr);gap:.65rem}
      .card-img{height:130px}
      .card-body{padding:.65rem .75rem .75rem}
      .card-titulo{font-size:.82rem}
      .card-precio{font-size:.92rem}
      .paginacion{gap:.3rem}
      .pag-btn{padding:.4rem .65rem;font-size:.78rem}
    }
    @media(max-width:380px){
      .grid{grid-template-columns:1fr}
      .card-img{height:160px}
    }
  </style>
</head>

<script>
const SUPA_URL='https://ayjlnbxcojqglcufqzob.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5amxuYnhjb2pxZ2xjdWZxem9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjE3MzcsImV4cCI6MjA5NTgzNzczN30.K3IF9CDiINmZ-rN3x40Z7eAivJFtMHRJHHlOnw7MUCY';
const db=window.supabase.createClient(SUPA_URL,SUPA_KEY);
const ICONS={repuestos:'🔧',autos:'🚗',motos:'🏍️',talleres:'🔩',electronica:'📱',inmuebles:'🏠',empleos:'💼',otros:'📦'};
const POR_PAG=12;
let todos=[],filtrados=[],pagina=1;

function tiempoRel(iso){
  const ms=Date.now()-new Date(iso);
  const m=Math.floor(ms/60000),h=Math.floor(ms/3600000),d=Math.floor(ms/86400000);
  if(m<60)return`hace ${m}m`;if(h<24)return`hace ${h}h`;return`hace ${d}d`;
}

async function cargar(){
  const{data,error}=await db.from('anuncios').select('*').eq('estado','aprobado')
    .order('destacado',{ascending:false}).order('created_at',{ascending:false});
  if(error){
    document.getElementById('grid').innerHTML='<div class="loading-msg">⚠️ Error al cargar. Intentá de nuevo.</div>';
    return;
  }
  todos=data||[];

  // Leer params de URL
  const p=new URLSearchParams(window.location.search);
  if(p.get('cat')){
    const r=document.querySelector(`input[name=cat][value="${p.get('cat')}"]`);
    if(r){r.checked=true;document.getElementById('searchCat').value=p.get('cat');}
    // pill mobile
    document.querySelectorAll('.pill-m').forEach(pl=>{
      pl.classList.toggle('ok', pl.getAttribute('onclick').includes(`'${p.get('cat')}'`));
    });
  }
  if(p.get('q')) document.getElementById('searchInput').value=p.get('q');

  aplicar();
}

function aplicar(){
  const cat=document.querySelector('input[name=cat]:checked')?.value||'';
  const ciudad=document.querySelector('input[name=ciudad]:checked')?.value||'';
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const pMin=Number(document.getElementById('pMin').value)||0;
  const pMax=Number(document.getElementById('pMax').value)||Infinity;
  const soloDest=document.getElementById('soloDest').checked;
  const soloVerif=document.getElementById('soloVerif').checked;
  const orden=document.getElementById('sortSel').value;

  filtrados=todos.filter(a=>{
    if(cat&&a.categoria!==cat)return false;
    if(ciudad&&a.ciudad!==ciudad)return false;
    if(q&&!(a.titulo||'').toLowerCase().includes(q)&&!(a.descripcion||'').toLowerCase().includes(q))return false;
    if(a.precio<pMin||a.precio>pMax)return false;
    if(soloDest&&!a.destacado)return false;
    if(soloVerif&&!a.verificado)return false;
    return true;
  });

  if(orden==='precio_asc')filtrados.sort((a,b)=>a.precio-b.precio);
  else if(orden==='precio_desc')filtrados.sort((a,b)=>b.precio-a.precio);
  else if(orden==='destacados')filtrados.sort((a,b)=>(b.destacado?1:0)-(a.destacado?1:0));
  else filtrados.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  // Tags activos
  const tags=[];
  if(cat)tags.push([cat,'cat']);
  if(ciudad)tags.push([ciudad,'ciudad']);
  if(q)tags.push([`"${q}"`,'q']);
  document.getElementById('tagsActivos').innerHTML=tags.map(([l,t])=>
    `<span class="tag-filtro" onclick="limpiarTag('${t}')">✕ ${l}</span>`
  ).join('');

  pagina=1;
  renderGrid();
}

function limpiarTag(tipo){
  if(tipo==='cat'){document.querySelectorAll('input[name=cat]')[0].checked=true;document.getElementById('searchCat').value='';}
  if(tipo==='ciudad')document.querySelectorAll('input[name=ciudad]')[0].checked=true;
  if(tipo==='q')document.getElementById('searchInput').value='';
  aplicar();
}

function limpiar(){
  document.querySelectorAll('input[name=cat]')[0].checked=true;
  document.querySelectorAll('input[name=ciudad]')[0].checked=true;
  document.getElementById('searchInput').value='';
  document.getElementById('searchCat').value='';
  document.getElementById('pMin').value='';
  document.getElementById('pMax').value='';
  document.getElementById('soloDest').checked=false;
  document.getElementById('soloVerif').checked=false;
  document.getElementById('sortSel').value='nuevos';
  document.querySelectorAll('.pill-m').forEach((p,i)=>p.classList.toggle('ok',i===0));
  aplicar();
}

function syncBuscar(q){
  document.getElementById('searchInput').value=q;
  aplicar();
}

function selPillMobile(cat,el){
  document.querySelectorAll('.pill-m').forEach(p=>p.classList.remove('ok'));
  el.classList.add('ok');
  const r=document.querySelector(`input[name=cat][value="${cat}"]`);
  if(r)r.checked=true;
  aplicar();
}

function renderGrid(){
  const total=filtrados.length;
  const inicio=(pagina-1)*POR_PAG;
  const pag=filtrados.slice(inicio,inicio+POR_PAG);

  document.getElementById('countTxt').innerHTML=
    `<strong>${total}</strong> anuncio${total!==1?'s':''} encontrado${total!==1?'s':''}`;

  if(!total){
    document.getElementById('grid').innerHTML=`
      <div class="empty-msg">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No encontramos anuncios</div>
        <div class="empty-sub">Probá con otros filtros o <a href="publicar.html">publicá el primero</a></div>
      </div>`;
    document.getElementById('paginacion').innerHTML='';
    return;
  }

  document.getElementById('grid').innerHTML=pag.map(a=>{
    const imgHtml=a.foto_url
      ?`<img src="${a.foto_url}" alt="${a.titulo}" loading="lazy" />`
      :`<span style="font-size:2.8rem">${ICONS[a.categoria]||'📦'}</span>`;
    return`
    <a href="detalle.html?id=${a.id}" class="card${a.destacado?' dest':''}">
      <div class="card-img">
        ${imgHtml}
        ${a.destacado?'<span class="b-dest">⭐ Destacado</span>':''}
        ${a.verificado?'<span class="b-verif">✓ Verificado</span>':''}
      </div>
      <div class="card-body">
        <div class="card-cat">${a.categoria}${a.subcategoria?' · '+a.subcategoria:''}</div>
        <div class="card-titulo">${a.titulo}</div>
        <div class="card-precio">Gs. ${Number(a.precio).toLocaleString()}</div>
        <div class="card-footer">
          <span class="card-loc">📍 ${a.ciudad||'Paraguay'}</span>
          <span class="card-tiempo">${tiempoRel(a.created_at)}</span>
        </div>
      </div>
    </a>`}).join('');

  // Paginación
  const totalPags=Math.ceil(total/POR_PAG);
  if(totalPags<=1){document.getElementById('paginacion').innerHTML='';return;}
  let html='';
  if(pagina>1)html+=`<button class="pag-btn" onclick="irPag(${pagina-1})">← Ant.</button>`;
  for(let i=1;i<=totalPags;i++){
    if(i===1||i===totalPags||Math.abs(i-pagina)<=1)
      html+=`<button class="pag-btn${i===pagina?' activo':''}" onclick="irPag(${i})">${i}</button>`;
    else if(Math.abs(i-pagina)===2)html+=`<span style="padding:.4rem .2rem;color:#bbb">…</span>`;
  }
  if(pagina<totalPags)html+=`<button class="pag-btn" onclick="irPag(${pagina+1})">Sig. →</button>`;
  document.getElementById('paginacion').innerHTML=html;
}

function irPag(n){pagina=n;renderGrid();window.scrollTo({top:0,behavior:'smooth'});}

cargar();
</script>
