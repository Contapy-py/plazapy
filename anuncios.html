<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anuncios — PlazaPY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --rojo:#E63020;--rojo-dark:#B8200F;--azul:#0A2463;--azul-mid:#1A3A8F;
      --crema:#F5F0E8;--arena:#E8E0D0;--carbon:#111;--gris:#6B6B6B;
      --verde:#1A7F4B;--amarillo:#F5C518;--blanco:#FAFAF8;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--crema);color:var(--carbon)}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:var(--azul);border-bottom:3px solid var(--rojo)}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--blanco);text-decoration:none}
    .nav-logo span{color:var(--rojo)}
    .nav-links{display:flex;gap:1.5rem;list-style:none}
    .nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.9rem;transition:color .2s}
    .nav-links a:hover{color:white}
    !!! NO APLICA !!!;color:white;padding:.5rem 1.2rem;border-radius:6px;text-decoration:none;font-size:.88rem;font-weight:600}
    .btn-pub:hover{background:var(--rojo-dark)}

    /* HERO BUSCADOR */
    .hero{background:var(--azul);padding:2.5rem 2rem}
    .hero-inner{max-width:900px;margin:0 auto;text-align:center}
    .hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:white;margin-bottom:.4rem}
    .hero p{color:rgba(255,255,255,.6);font-size:.95rem;margin-bottom:1.5rem}
    .search-bar{display:flex;background:white;border-radius:10px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.2);max-width:700px;margin:0 auto}
    .search-bar select{border:none;outline:none;background:var(--arena);padding:0 1rem;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;color:var(--carbon);border-right:2px solid var(--arena);min-width:150px;cursor:pointer}
    .search-bar input{flex:1;border:none;outline:none;padding:.9rem 1rem;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--carbon);background:transparent}
    .search-bar button{background:var(--rojo);border:none;color:white;padding:0 1.4rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:background .2s}
    .search-bar button:hover{background:var(--rojo-dark)}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:240px 1fr;gap:1.5rem;max-width:1200px;margin:0 auto;padding:2rem 1.5rem}

    /* SIDEBAR FILTROS */
    .sidebar{position:sticky;top:80px;height:fit-content}
    .filtro-box{background:var(--blanco);border-radius:12px;border:1.5px solid var(--arena);padding:1.25rem;margin-bottom:1rem}
    .filtro-titulo{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;margin-bottom:.9rem;padding-bottom:.6rem;border-bottom:1.5px solid var(--arena)}
    .filtro-item{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;cursor:pointer;font-size:.88rem;transition:color .15s}
    .filtro-item:hover{color:var(--azul)}
    .filtro-item input[type=radio],
    .filtro-item input[type=checkbox]{accent-color:var(--azul);cursor:pointer}
    .filtro-item.activo{color:var(--azul);font-weight:600}
    .precio-inputs{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
    .precio-inputs input{flex:1;padding:.5rem .6rem;border:1.5px solid var(--arena);border-radius:6px;font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none;background:var(--crema)}
    .precio-inputs input:focus{border-color:var(--azul)}
    .precio-inputs span{font-size:.75rem;color:var(--gris);flex-shrink:0}
    .btn-filtrar{width:100%;background:var(--azul);color:white;border:none;padding:.65rem;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;margin-top:.75rem}
    .btn-limpiar{width:100%;background:transparent;color:var(--gris);border:1.5px solid var(--arena);padding:.55rem;border-radius:7px;font-size:.82rem;cursor:pointer;margin-top:.4rem}

    /* CONTENT */
    .content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:gap}
    .results-count{font-size:.88rem;color:var(--gris)}
    .results-count strong{color:var(--carbon)}
    .sort-select{padding:.45rem .75rem;border:1.5px solid var(--arena);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.85rem;background:var(--blanco);outline:none;cursor:pointer}

    /* PILLS CATEGORÍA MOBILE */
    .cat-pills-scroll{display:none;gap:.5rem;overflow-x:auto;padding:.75rem 1rem;background:var(--blanco);border-bottom:1px solid var(--arena);scrollbar-width:none}
    .cat-pills-scroll::-webkit-scrollbar{display:none}
    .cat-pill-m{padding:.4rem .9rem;border-radius:100px;border:1.5px solid var(--arena);font-size:.82rem;white-space:nowrap;cursor:pointer;flex-shrink:0;background:var(--crema)}
    .cat-pill-m.ok{background:var(--azul);color:white;border-color:var(--azul)}

    /* GRID ANUNCIOS */
    .anuncios-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}

    .anuncio-card{background:var(--blanco);border-radius:12px;border:1.5px solid var(--arena);overflow:hidden;transition:all .2s;cursor:pointer;text-decoration:none;display:block;color:var(--carbon)}
    .anuncio-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.1);border-color:var(--gris)}
    .anuncio-card.destacado{border-color:var(--amarillo);box-shadow:0 0 0 1px var(--amarillo)}

    .card-img{height:170px;background:var(--arena);display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .badge-dest{position:absolute;top:.6rem;left:.6rem;background:var(--amarillo);color:var(--carbon);font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase}
    .badge-verif{position:absolute;top:.6rem;right:.6rem;background:var(--verde);color:white;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:100px}

    .card-body{padding:.9rem 1rem 1rem}
    .card-cat{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);margin-bottom:.3rem}
    .card-titulo{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;line-height:1.3;margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-precio{font-size:1.1rem;font-weight:700;color:var(--rojo);margin-bottom:.5rem}
    .card-meta{display:flex;justify-content:space-between;align-items:center}
    .card-loc{font-size:.78rem;color:var(--gris)}
    .card-tiempo{font-size:.72rem;color:#bbb}

    /* LOADING / EMPTY */
    .loading{grid-column:1/-1;text-align:center;padding:4rem;color:var(--gris)}
    .loading-spinner{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--gris)}
    .empty-icon{font-size:3rem;margin-bottom:.75rem}

    /* PAGINACIÓN */
    .paginacion{display:flex;gap:.5rem;justify-content:center;margin-top:2rem;flex-wrap:wrap}
    .pag-btn{padding:.5rem .9rem;border-radius:7px;border:1.5px solid var(--arena);background:var(--blanco);font-size:.85rem;cursor:pointer;transition:all .15s}
    .pag-btn:hover{border-color:var(--azul);color:var(--azul)}
    .pag-btn.activo{background:var(--azul);color:white;border-color:var(--azul)}
    .pag-btn:disabled{opacity:.4;cursor:not-allowed}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr;padding:1rem}
      .sidebar{display:none}
      .cat-pills-scroll{display:flex}
      nav{padding:0 1rem}
      .nav-links{display:none}
      .hero{padding:1.75rem 1rem}
      .hero h1{font-size:1.4rem}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Plaza<span>PY</span></a>
  <ul class="nav-links">
    <li><a href="anuncios.html">Ver anuncios</a></li>
    <li><a href="publicar.html">Publicar</a></li>
  </ul>
  <a href="publicar.html" class="btn-pub">+ Publicar gratis</a>
</nav>

<!-- PILLS MOBILE -->
<div class="cat-pills-scroll" id="pillsMobile">
  <div class="cat-pill-m ok" onclick="filtrarMobile('todos',this)">Todos</div>
  <div class="cat-pill-m" onclick="filtrarMobile('repuestos',this)">🔧 Repuestos</div>
  <div class="cat-pill-m" onclick="filtrarMobile('autos',this)">🚗 Autos</div>
  <div class="cat-pill-m" onclick="filtrarMobile('motos',this)">🏍️ Motos</div>
  <div class="cat-pill-m" onclick="filtrarMobile('talleres',this)">🔩 Talleres</div>
  <div class="cat-pill-m" onclick="filtrarMobile('electronica',this)">📱 Electrónica</div>
  <div class="cat-pill-m" onclick="filtrarMobile('inmuebles',this)">🏠 Inmuebles</div>
  <div class="cat-pill-m" onclick="filtrarMobile('empleos',this)">💼 Empleos</div>
  <div class="cat-pill-m" onclick="filtrarMobile('otros',this)">📦 Otros</div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <h1>Encontrá lo que necesitás</h1>
    <p>Miles de anuncios verificados en Paraguay</p>
    <div class="search-bar">
      <select id="searchCat" onchange="aplicarFiltros()">
        <option value="">Todas las categorías</option>
        <option value="repuestos">🔧 Repuestos</option>
        <option value="autos">🚗 Autos usados</option>
        <option value="motos">🏍️ Motos</option>
        <option value="talleres">🔩 Talleres</option>
        <option value="electronica">📱 Electrónica</option>
        <option value="inmuebles">🏠 Inmuebles</option>
        <option value="empleos">💼 Empleos</option>
        <option value="otros">📦 Otros</option>
      </select>
      <input type="text" id="searchInput" placeholder="¿Qué estás buscando?" onkeydown="if(event.key==='Enter')aplicarFiltros()" />
      <button onclick="aplicarFiltros()">Buscar</button>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filtro-box">
      <div class="filtro-titulo">📦 Categoría</div>
      <label class="filtro-item"><input type="radio" name="cat" value="" checked onchange="aplicarFiltros()"> Todas</label>
      <label class="filtro-item"><input type="radio" name="cat" value="repuestos" onchange="aplicarFiltros()"> 🔧 Repuestos</label>
      <label class="filtro-item"><input type="radio" name="cat" value="autos" onchange="aplicarFiltros()"> 🚗 Autos usados</label>
      <label class="filtro-item"><input type="radio" name="cat" value="motos" onchange="aplicarFiltros()"> 🏍️ Motos</label>
      <label class="filtro-item"><input type="radio" name="cat" value="talleres" onchange="aplicarFiltros()"> 🔩 Talleres</label>
      <label class="filtro-item"><input type="radio" name="cat" value="electronica" onchange="aplicarFiltros()"> 📱 Electrónica</label>
      <label class="filtro-item"><input type="radio" name="cat" value="inmuebles" onchange="aplicarFiltros()"> 🏠 Inmuebles</label>
      <label class="filtro-item"><input type="radio" name="cat" value="empleos" onchange="aplicarFiltros()"> 💼 Empleos</label>
      <label class="filtro-item"><input type="radio" name="cat" value="otros" onchange="aplicarFiltros()"> 📦 Otros</label>
    </div>

    <div class="filtro-box">
      <div class="filtro-titulo">📍 Ciudad</div>
      <label class="filtro-item"><input type="radio" name="ciudad" value="" checked onchange="aplicarFiltros()"> Todas</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Asunción" onchange="aplicarFiltros()"> Asunción</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="San Lorenzo" onchange="aplicarFiltros()"> San Lorenzo</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Luque" onchange="aplicarFiltros()"> Luque</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Lambaré" onchange="aplicarFiltros()"> Lambaré</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Fernando de la Mora" onchange="aplicarFiltros()"> Fernando de la Mora</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Ciudad del Este" onchange="aplicarFiltros()"> Ciudad del Este</label>
      <label class="filtro-item"><input type="radio" name="ciudad" value="Encarnación" onchange="aplicarFiltros()"> Encarnación</label>
    </div>

    <div class="filtro-box">
      <div class="filtro-titulo">💰 Precio (Gs.)</div>
      <div class="precio-inputs">
        <input type="number" id="precioMin" placeholder="Mín" min="0" />
        <span>—</span>
        <input type="number" id="precioMax" placeholder="Máx" min="0" />
      </div>
      <button class="btn-filtrar" onclick="aplicarFiltros()">Aplicar filtros</button>
      <button class="btn-limpiar" onclick="limpiarFiltros()">Limpiar filtros</button>
    </div>

    <div class="filtro-box">
      <div class="filtro-titulo">⭐ Mostrar</div>
      <label class="filtro-item"><input type="checkbox" id="soloDestacados" onchange="aplicarFiltros()"> Solo destacados</label>
    </div>
  </aside>

  <!-- CONTENT -->
  <div>
    <div class="content-header">
      <div class="results-count" id="resultsCount">Cargando...</div>
      <select class="sort-select" id="sortSelect" onchange="aplicarFiltros()">
        <option value="nuevos">Más recientes</option>
        <option value="precio_asc">Precio: menor a mayor</option>
        <option value="precio_desc">Precio: mayor a menor</option>
        <option value="destacados">Destacados primero</option>
      </select>
    </div>

    <div class="anuncios-grid" id="grid">
      <div class="loading"><span class="loading-spinner">⏳</span>Cargando anuncios...</div>
    </div>

    <div class="paginacion" id="paginacion"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://ayjlnbxcojqglcufqzob.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5amxuYnhjb2pxZ2xjdWZxem9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjE3MzcsImV4cCI6MjA5NTgzNzczN30.K3IF9CDiINmZ-rN3x40Z7eAivJFtMHRJHHlOnw7MUCY';
const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const CATS = {repuestos:'🔧',autos:'🚗',motos:'🏍️',talleres:'🔩',electronica:'📱',inmuebles:'🏠',empleos:'💼',otros:'📦'};
const POR_PAGINA = 12;
let pagina = 1;
let todos = [];
let filtrados = [];

const iconoCat = c => CATS[c] || '📦';
const tiempoRelativo = iso => {
  const diff = Date.now() - new Date(iso);
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (m < 60) return `hace ${m}m`;
  if (h < 24) return `hace ${h}h`;
  return `hace ${d}d`;
};

async function cargar() {
  const { data, error } = await db
    .from('anuncios')
    .select('*')
    .eq('estado','aprobado')
    .order('destacado', { ascending: false })
    .order('created_at', { ascending: false });

  if (error) { document.getElementById('grid').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Error al cargar anuncios.</div>'; return; }
  todos = data || [];
  aplicarFiltros();
}

function aplicarFiltros() {
  const cat = document.querySelector('input[name=cat]:checked')?.value || document.getElementById('searchCat').value || '';
  const ciudad = document.querySelector('input[name=ciudad]:checked')?.value || '';
  const texto = document.getElementById('searchInput').value.toLowerCase().trim();
  const precioMin = Number(document.getElementById('precioMin').value) || 0;
  const precioMax = Number(document.getElementById('precioMax').value) || Infinity;
  const soloDestacados = document.getElementById('soloDestacados').checked;
  const orden = document.getElementById('sortSelect').value;

  filtrados = todos.filter(a => {
    if (cat && a.categoria !== cat) return false;
    if (ciudad && a.ciudad !== ciudad) return false;
    if (texto && !(a.titulo||'').toLowerCase().includes(texto) && !(a.descripcion||'').toLowerCase().includes(texto)) return false;
    if (a.precio < precioMin || a.precio > precioMax) return false;
    if (soloDestacados && !a.destacado) return false;
    return true;
  });

  // Ordenar
  if (orden === 'precio_asc') filtrados.sort((a,b) => a.precio - b.precio);
  else if (orden === 'precio_desc') filtrados.sort((a,b) => b.precio - a.precio);
  else if (orden === 'destacados') filtrados.sort((a,b) => (b.destacado?1:0) - (a.destacado?1:0));
  else filtrados.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  pagina = 1;
  renderGrid();
}

function limpiarFiltros() {
  document.querySelectorAll('input[name=cat]')[0].checked = true;
  document.querySelectorAll('input[name=ciudad]')[0].checked = true;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCat').value = '';
  document.getElementById('precioMin').value = '';
  document.getElementById('precioMax').value = '';
  document.getElementById('soloDestacados').checked = false;
  document.getElementById('sortSelect').value = 'nuevos';
  aplicarFiltros();
}

function filtrarMobile(cat, el) {
  document.querySelectorAll('.cat-pill-m').forEach(p => p.classList.remove('ok'));
  el.classList.add('ok');
  // Sincronizar con radio buttons
  const radio = document.querySelector(`input[name=cat][value="${cat}"]`);
  if (radio) radio.checked = true;
  else document.querySelectorAll('input[name=cat]')[0].checked = true;
  aplicarFiltros();
}

function renderGrid() {
  const inicio = (pagina-1)*POR_PAGINA;
  const pagAnuncios = filtrados.slice(inicio, inicio+POR_PAGINA);
  const total = filtrados.length;

  document.getElementById('resultsCount').innerHTML =
    `<strong>${total}</strong> anuncio${total!==1?'s':''} encontrado${total!==1?'s':''}`;

  if (total === 0) {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div style="font-weight:600;margin-bottom:.4rem">No encontramos anuncios</div>
        <div style="font-size:.85rem">Probá con otros filtros o <a href="publicar.html" style="color:var(--rojo)">publicá el primero</a></div>
      </div>`;
    document.getElementById('paginacion').innerHTML = '';
    return;
  }

  document.getElementById('grid').innerHTML = pagAnuncios.map(a => `
    <a href="detalle.html?id=${a.id}" class="anuncio-card${a.destacado?' destacado':''}">
      <div class="card-img">
        ${iconoCat(a.categoria)}
        ${a.destacado ? '<span class="badge-dest">⭐ Destacado</span>' : ''}
        ${a.verificado ? '<span class="badge-verif">✓ Verificado</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-cat">${a.categoria} ${a.subcategoria ? '· '+a.subcategoria : ''}</div>
        <div class="card-titulo">${a.titulo}</div>
        <div class="card-precio">Gs. ${Number(a.precio).toLocaleString()}</div>
        <div class="card-meta">
          <span class="card-loc">📍 ${a.ciudad||'Paraguay'}</span>
          <span class="card-tiempo">${tiempoRelativo(a.created_at)}</span>
        </div>
      </div>
    </a>
  `).join('');

  // Paginación
  const totalPags = Math.ceil(total/POR_PAGINA);
  if (totalPags <= 1) { document.getElementById('paginacion').innerHTML = ''; return; }
  let pags = '';
  if (pagina > 1) pags += `<button class="pag-btn" onclick="irPag(${pagina-1})">← Anterior</button>`;
  for (let i=1;i<=totalPags;i++) {
    if (i===1||i===totalPags||Math.abs(i-pagina)<=1)
      pags += `<button class="pag-btn${i===pagina?' activo':''}" onclick="irPag(${i})">${i}</button>`;
    else if (Math.abs(i-pagina)===2) pags += `<span style="padding:.5rem .3rem;color:var(--gris)">…</span>`;
  }
  if (pagina < totalPags) pags += `<button class="pag-btn" onclick="irPag(${pagina+1})">Siguiente →</button>`;
  document.getElementById('paginacion').innerHTML = pags;
}

function irPag(n) {
  pagina = n;
  renderGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Leer parámetros de URL (ej: anuncios.html?cat=repuestos)
const params = new URLSearchParams(window.location.search);
if (params.get('cat')) {
  const radio = document.querySelector(`input[name=cat][value="${params.get('cat')}"]`);
  if (radio) radio.checked = true;
  document.getElementById('searchCat').value = params.get('cat');
}

cargar();
</script>
</body>
</html>
