<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1VML3DMJ80"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-1VML3DMJ80');

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta — PlazaPY</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--rojo:#C1440E;--rojo-dark:#9A350A;--rojo-light:#FBEAE0;--naranja:#E8763C;--amarillo:#F2B705;--amarillo-dark:#D89F00;--negro:#2B211A;--gris:#7C7267;--borde:#ECE3D6;--blanco:#fff;--fondo:#FAF6EF;--verde:#2F6B4F;--verde-light:#E4F0E9;--carbon:#2B211A}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:var(--negro)}
    nav{position:sticky;top:0;z-index:100;background:white;height:64px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;border-bottom:1px solid var(--borde)}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--rojo);text-decoration:none}
    .nav-logo span{color:var(--naranja)}
    .nav-right{margin-left:auto;display:flex;gap:.75rem;align-items:center}
    .nav-user{color:var(--gris);font-size:.85rem}
    .btn-nav{padding:.45rem 1.1rem;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;font-family:'DM Sans',sans-serif}
    .btn-pub{background:var(--rojo);color:white}
    .btn-pub:hover{background:var(--rojo-dark)}
    .btn-salir{background:var(--fondo);color:var(--negro);border:1.5px solid var(--borde)}
    .btn-salir:hover{background:#eee}

    .page{max-width:1000px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:220px 1fr;gap:1.5rem}
    .sidebar{position:sticky;top:84px;height:fit-content}
    .perfil-card{background:white;border-radius:12px;border:1.5px solid var(--borde);padding:1.5rem;text-align:center;margin-bottom:.75rem}
    .perfil-avatar{width:64px;height:64px;border-radius:50%;background:var(--rojo-light);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto .75rem;color:var(--rojo);font-weight:700}
    .perfil-nombre{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.2rem}
    .perfil-email{font-size:.78rem;color:var(--gris)}
    .perfil-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:.5rem}
    .badge-free{background:var(--fondo);color:var(--gris);border:1px solid var(--borde)}
    .badge-verif{background:var(--verde-light);color:var(--verde)}
    .badge-tienda{background:var(--rojo-light);color:var(--rojo)}

    .menu-nav{background:white;border-radius:12px;border:1.5px solid var(--borde);overflow:hidden}
    .menu-item{display:flex;align-items:center;gap:.65rem;padding:.8rem 1.1rem;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--gris);border-bottom:1px solid var(--borde);transition:all .15s;text-decoration:none}
    .menu-item:last-child{border-bottom:none}
    .menu-item:hover{background:var(--fondo);color:var(--negro)}
    .menu-item.activo{background:var(--rojo-light);color:var(--rojo);font-weight:600}
    .menu-item .ico{font-size:1rem;width:20px;text-align:center}
    .menu-badge{margin-left:auto;background:var(--rojo);color:white;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:100px}
    .menu-destacado{background:linear-gradient(135deg,var(--rojo),var(--naranja));color:white !important;font-weight:700}
    .menu-destacado:hover{opacity:.92}

    .main{}
    .sec-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:1.25rem}
    .panel{background:white;border-radius:12px;border:1.5px solid var(--borde);padding:1.5rem;margin-bottom:1rem}
    .panel-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gris);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--borde)}

    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
    .stat{background:white;border-radius:10px;border:1.5px solid var(--borde);padding:1.1rem;text-align:center}
    .stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;line-height:1}
    .stat-lbl{font-size:.75rem;color:var(--gris);margin-top:.25rem}

    .tienda-banner-card{background:linear-gradient(135deg,var(--rojo),var(--naranja));border-radius:12px;padding:1.5rem;color:white;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .tienda-banner-card h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:.4rem}
    .tienda-banner-card p{font-size:.85rem;opacity:.9}
    .btn-tienda-cta{background:white;color:var(--rojo);padding:.65rem 1.4rem;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;text-decoration:none;white-space:nowrap}

    .anuncio-row{display:flex;gap:1rem;align-items:flex-start;padding:1rem;border-bottom:1px solid var(--borde);transition:background .15s}
    .anuncio-row:last-child{border-bottom:none}
    .anuncio-row:hover{background:var(--fondo)}
    .anuncio-thumb{width:72px;height:72px;border-radius:8px;background:var(--fondo);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden;border:1px solid var(--borde)}
    .anuncio-thumb img{width:100%;height:100%;object-fit:cover}
    .anuncio-info{flex:1;min-width:0}
    .anuncio-titulo{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;margin-bottom:.25rem}
    .anuncio-precio{font-size:.95rem;font-weight:700;color:var(--rojo);margin-bottom:.3rem}
    .anuncio-meta{font-size:.75rem;color:var(--gris);display:flex;gap:.75rem;flex-wrap:wrap}

    .badge{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:100px;text-transform:uppercase}
    .b-pend{background:#fff3cd;color:#856404}
    .b-apro{background:var(--verde-light);color:var(--verde)}
    .b-rech{background:#fde8e8;color:var(--rojo)}

    .empty{text-align:center;padding:3rem 2rem;color:var(--gris)}
    .empty-icon{font-size:3rem;margin-bottom:.75rem}
    .empty h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--negro);margin-bottom:.4rem}
    .empty p{font-size:.85rem;margin-bottom:1.25rem}
    .btn-empty{display:inline-block;background:var(--rojo);color:white;padding:.7rem 1.5rem;border-radius:7px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem}

    .campo{margin-bottom:1rem}
    .campo label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.35rem}
    .campo input{width:100%;padding:.68rem .9rem;border:1.5px solid var(--borde);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--fondo);outline:none;transition:border-color .2s}
    .campo input:focus{border-color:var(--rojo);background:white}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .btn-guardar{background:var(--rojo);color:white;border:none;padding:.72rem 1.75rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer}
    .btn-guardar:hover{background:var(--rojo-dark)}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--carbon);color:white;padding:.85rem 1.3rem;border-radius:10px;font-size:.85rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.v{transform:translateY(0);opacity:1}
    .toast.verde{background:var(--verde)}
    .toast.rojo{background:var(--rojo)}
    .seccion{display:none}
    .seccion.v{display:block}

    @media(max-width:768px){
      .page{grid-template-columns:1fr;padding:1rem}
      .sidebar{position:static}
      .stats-row{grid-template-columns:1fr 1fr}
      .grid2{grid-template-columns:1fr}
      nav{padding:0 1rem}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Plaza<span>PY</span></a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <a href="mi-tienda.html" class="btn-nav btn-pub">🏪 Mi tienda</a>
    <button class="btn-nav btn-salir" onclick="salir()">Salir</button>
  </div>
</nav>

<div class="page">
  <aside class="sidebar">
    <div class="perfil-card">
      <div class="perfil-avatar" id="avatar">👤</div>
      <div class="perfil-nombre" id="perfilNombre">Cargando...</div>
      <div class="perfil-email" id="perfilEmail"></div>
      <span class="perfil-badge badge-free" id="perfilBadge">Cuenta gratuita</span>
    </div>
    <div class="menu-nav">
      <a class="menu-item activo" onclick="verSec('dashboard',this)"><span class="ico">🏠</span> Inicio</a>
      <a class="menu-item menu-destacado" href="mi-tienda.html"><span class="ico">🏪</span> Mi tienda <span class="menu-badge" id="badgeTienda" style="display:none">!</span></a>
      <a class="menu-item" onclick="verSec('perfil',this)"><span class="ico">👤</span> Mi perfil</a>
    </div>
  </aside>

  <div class="main">
    <div class="seccion v" id="secDashboard">
      <div class="sec-title" id="saludo">¡Hola! 👋</div>

      <div class="tienda-banner-card" id="tiendaCard">
        <div>
          <h3 id="tiendaCardTitulo">🏪 ¿Tenés un negocio?</h3>
          <p id="tiendaCardDesc">Creá tu tienda gratis y empezá a vender en PlazaPY hoy mismo.</p>
        </div>
        <a href="mi-tienda.html" class="btn-tienda-cta" id="tiendaCardBtn">Crear mi tienda →</a>
      </div>

      <div class="stats-row" id="statsRow" style="display:none">
        <div class="stat"><div class="stat-num" id="stTotal">0</div><div class="stat-lbl">Productos</div></div>
        <div class="stat"><div class="stat-num" id="stActivos" style="color:var(--verde)">0</div><div class="stat-lbl">Aprobados</div></div>
        <div class="stat"><div class="stat-num" id="stPend" style="color:var(--amarillo-dark)">0</div><div class="stat-lbl">Pendientes</div></div>
      </div>

      <div class="panel" id="panelProductos" style="display:none">
        <div class="panel-title">Mis productos recientes</div>
        <div id="dashProductos"></div>
      </div>
    </div>

    <div class="seccion" id="secPerfil">
      <div class="sec-title">Mi perfil</div>
      <div class="panel">
        <div class="panel-title">Datos personales</div>
        <div class="grid2">
          <div class="campo"><label>Nombre</label><input type="text" id="pNombre" placeholder="Tu nombre"/></div>
          <div class="campo"><label>WhatsApp</label><input type="tel" id="pWa" placeholder="+595 981 123 456"/></div>
        </div>
        <div class="campo"><label>Email</label><input type="email" id="pEmail" disabled style="opacity:.6"/></div>
        <button class="btn-guardar" onclick="guardarPerfil()">Guardar cambios</button>
      </div>
      <div class="panel">
        <div class="panel-title">Seguridad</div>
        <div class="campo"><label>Nueva contraseña</label><input type="password" id="newPass" placeholder="Mínimo 6 caracteres"/></div>
        <button class="btn-guardar" onclick="cambiarPass()">Cambiar contraseña</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://ayjlnbxcojqglcufqzob.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5amxuYnhjb2pxZ2xjdWZxem9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjE3MzcsImV4cCI6MjA5NTgzNzczN30.K3IF9CDiINmZ-rN3x40Z7eAivJFtMHRJHHlOnw7MUCY';
const db=window.supabase.createClient(SUPA_URL,SUPA_KEY);
const ICONS={electronica:'📱',ropa:'👗',hogar:'🏠',deportes:'⚽',belleza:'💄',alimentos:'🍔',juguetes:'🧸',mascotas:'🐾',autos:'🚗',servicios:'🔧',libros:'📚',otros:'📦'};

let usuario=null;

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){window.location.href='auth.html';return;}
  usuario=session.user;
  document.getElementById('navUser').textContent=usuario.email;
  document.getElementById('pEmail').value=usuario.email;

  const{data:perfil}=await db.from('perfiles').select('*').eq('id',usuario.id).maybeSingle();
  if(perfil){
    document.getElementById('perfilNombre').textContent=perfil.nombre||'Sin nombre';
    document.getElementById('saludo').textContent='¡Hola, '+(perfil.nombre?.split(' ')[0]||'')+'! 👋';
    document.getElementById('avatar').textContent=perfil.nombre?perfil.nombre[0].toUpperCase():'👤';
    document.getElementById('pNombre').value=perfil.nombre||'';
    document.getElementById('pWa').value=perfil.whatsapp||'';
  } else {
    document.getElementById('perfilNombre').textContent=usuario.email.split('@')[0];
    document.getElementById('saludo').textContent='¡Hola! 👋';
  }

  // Verificar si tiene tienda
  const{data:tienda}=await db.from('tiendas').select('*').eq('user_id',usuario.id).maybeSingle();
  if(tienda){
    document.getElementById('perfilBadge').textContent='🏪 Tiene tienda';
    document.getElementById('perfilBadge').className='perfil-badge badge-tienda';
    document.getElementById('tiendaCardTitulo').textContent='🏪 '+tienda.nombre;
    document.getElementById('tiendaCardDesc').textContent=tienda.estado==='activa'?'Tu tienda está activa y visible para compradores.':'Tu tienda está en revisión. La aprobamos pronto.';
    document.getElementById('tiendaCardBtn').textContent='Gestionar tienda →';

    document.getElementById('statsRow').style.display='grid';
    document.getElementById('panelProductos').style.display='block';

    const{data:productos}=await db.from('productos').select('*').eq('tienda_id',tienda.id).order('created_at',{ascending:false});
    const ps=productos||[];
    document.getElementById('stTotal').textContent=ps.length;
    document.getElementById('stActivos').textContent=ps.filter(p=>p.estado==='aprobado').length;
    document.getElementById('stPend').textContent=ps.filter(p=>p.estado==='pendiente').length;

    const dash=document.getElementById('dashProductos');
    if(ps.length){
      dash.innerHTML=ps.slice(0,5).map(p=>`
        <div class="anuncio-row">
          <div class="anuncio-thumb">${p.foto_url?`<img src="${p.foto_url}"/>`:ICONS[p.categoria]||'📦'}</div>
          <div class="anuncio-info">
            <div class="anuncio-titulo">${p.nombre}</div>
            <div class="anuncio-precio">Gs. ${Number(p.precio_oferta||p.precio).toLocaleString()}</div>
            <div class="anuncio-meta"><span class="badge ${p.estado==='aprobado'?'b-apro':'b-pend'}">${p.estado}</span></div>
          </div>
        </div>`).join('');
    } else {
      dash.innerHTML='<div class="empty"><div class="empty-icon">📦</div><h3>Sin productos todavía</h3><p>Cargá tu primer producto desde tu panel de tienda.</p><a href="mi-tienda.html" class="btn-empty">+ Agregar producto</a></div>';
    }
  }
}

function verSec(sec,el){
  document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('v'));
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('activo'));
  document.getElementById('sec'+sec.charAt(0).toUpperCase()+sec.slice(1)).classList.add('v');
  if(el)el.classList.add('activo');
}

async function guardarPerfil(){
  const nombre=document.getElementById('pNombre').value.trim();
  const wa=document.getElementById('pWa').value.trim();
  const{error}=await db.from('perfiles').upsert({id:usuario.id,nombre,whatsapp:wa,email:usuario.email});
  if(error){toast('Error al guardar.','rojo');return;}
  document.getElementById('perfilNombre').textContent=nombre||'Sin nombre';
  document.getElementById('avatar').textContent=nombre?nombre[0].toUpperCase():'👤';
  toast('Perfil actualizado.','verde');
}

async function cambiarPass(){
  const pass=document.getElementById('newPass').value;
  if(pass.length<6){toast('Mínimo 6 caracteres.','rojo');return;}
  const{error}=await db.auth.updateUser({password:pass});
  if(error){toast('Error: '+error.message,'rojo');return;}
  document.getElementById('newPass').value='';
  toast('Contraseña actualizada.','verde');
}

async function salir(){await db.auth.signOut();window.location.href='index.html';}

function toast(msg,tipo){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast v ${tipo||''}`;
  setTimeout(()=>t.classList.remove('v'),3000);
}

init();
</script>
</body>
</html>
